# =============================================================================
#  Secure & Monitored Homelab - Stack Docker Compose
# -----------------------------------------------------------------------------
#  Segmentation reseau :
#    - frontend_net  : exposition publique (reverse proxy)
#    - backend_net   : services applicatifs + bases de donnees
#    - monitoring_net : metriques et supervision
#
#  Note : la cle "version" a ete retiree.
#  Astuce reproductibilite : remplacer les tags "latest" par des versions
#  figees (ex: grafana/grafana:11.4.0) pour des deploiements deterministes.
# =============================================================================

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
  monitoring_net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  uptime-kuma:

services:

  # ===========================================================================
  #  REVERSE PROXY & SSL
  # ===========================================================================
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    environment:
      DB_MYSQL_HOST: "db-npm"
      DB_MYSQL_PORT: 3306
      DB_MYSQL_USER: "${NPM_DB_USER}"
      DB_MYSQL_PASSWORD: "${NPM_DB_PASSWORD}"
      DB_MYSQL_NAME: "npm"
      TZ: "${TIMEZONE}"
    volumes:
      - ./data/npm:/data
      - ./letsencrypt:/etc/letsencrypt
    depends_on:
      - db-npm
    networks:
      - frontend_net
      - backend_net

  db-npm:
    image: jc21/mariadb-aria:latest
    container_name: db-npm
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${NPM_DB_PASSWORD}"
      MYSQL_DATABASE: "npm"
      MYSQL_USER: "${NPM_DB_USER}"
      MYSQL_PASSWORD: "${NPM_DB_PASSWORD}"
      TZ: "${TIMEZONE}"
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - backend_net

  # ===========================================================================
  #  SECURITE (IPS/IDS) & DEFENSE ACTIVE
  # ===========================================================================
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: always
    environment:
      COLLECTIONS: "crowdsecurity/nginx-proxy-manager crowdsecurity/http-cve crowdsecurity/linux crowdsecurity/sshd crowdsecurity/cowrie"
      TZ: "${TIMEZONE}"
    volumes:
      - ./crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml
      - ./crowdsec/db:/var/lib/crowdsec/data/
      - ./crowdsec/config:/etc/crowdsec/
      - ./data/npm:/var/log/npm:ro
      - ./cowrie/var/log/cowrie:/var/log/cowrie:ro
    networks:
      - backend_net
      - monitoring_net

  cowrie:
    image: cowrie/cowrie:latest
    container_name: cowrie
    restart: unless-stopped
    ports:
      - "2222:2222"
    volumes:
      - ./cowrie/etc:/cowrie/cowrie-git/etc
      - ./cowrie/var/log/cowrie:/cowrie/cowrie-git/var/log/cowrie
    networks:
      - backend_net

  # ===========================================================================
  #  BUSINESS INTELLIGENCE (Threat Intel)
  # ===========================================================================
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped
    ports:
      - "3008:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      TZ: "${TIMEZONE}"
    volumes:
      - ./metabase-data:/metabase-data
      - ./crowdsec/db:/crowdsec-db:ro
    networks:
      - backend_net

  # ===========================================================================
  #  SAUVEGARDE & RESILIENCE (3-2-1)
  # ===========================================================================
  duplicati:
    image: duplicati/duplicati:latest
    container_name: duplicati
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIMEZONE}
    volumes:
      - ./duplicati/config:/data
      - ./data:/source:ro
    networks:
      - backend_net

  # ===========================================================================
  #  MONITORING & OBSERVABILITE
  # ===========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - monitoring_net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD}"
      TZ: "${TIMEZONE}"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring_net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring_net

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma:/app/data
    networks:
      - monitoring_net
